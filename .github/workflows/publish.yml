name: Release and publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Create or update release
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out release
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release version
        if: steps.release.outputs.release_created == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          package_version=$(node --print "require('./package.json').version")

          if [[ "$RELEASE_TAG" != "v$RELEASE_VERSION" ]]; then
            echo "Release tag $RELEASE_TAG does not match version $RELEASE_VERSION." >&2
            exit 1
          fi

          if [[ "$package_version" != "$RELEASE_VERSION" ]]; then
            echo "package.json version $package_version does not match release $RELEASE_VERSION." >&2
            exit 1
          fi

      - name: Install exact dependencies
        if: steps.release.outputs.release_created == 'true'
        run: npm ci

      - name: Validate release
        if: steps.release.outputs.release_created == 'true'
        run: npm run check

      - name: Preview package contents
        if: steps.release.outputs.release_created == 'true'
        run: npm pack --dry-run --ignore-scripts

      - name: Check whether version is already published
        if: steps.release.outputs.release_created == 'true'
        id: registry
        shell: bash
        run: |
          package_name=$(node --print "require('./package.json').name")
          package_version=$(node --print "require('./package.json').version")

          if npm view "$package_name@$package_version" version --json >/dev/null 2>&1; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version is already published; nothing to do."
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: >-
          steps.release.outputs.release_created == 'true' &&
          steps.registry.outputs.already-published != 'true'
        run: npm publish --ignore-scripts
